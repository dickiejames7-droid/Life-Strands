<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life Strands">
<meta name="theme-color" content="#f0ede6">
<title>Life Strands</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ede6; --ink: #1a1510; --mid: #6b5f4a; --faint: #ddd8cc;
    --accent: #7a5c3a; --accent2: #3a5c4a; --accent3: #3a3d5c;
    --card: #faf8f3; --subcard: #f0ece3;
    --prin: #7a5c3a; --found: #3a5c4a; --act: #3a3d5c; --people: #6b3a5c;
    --shadow: rgba(26,21,16,0.1); --radius: 4px; --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; padding-bottom: env(safe-area-inset-bottom); }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.7; }
  header { padding: 14px 16px 0; padding-top: calc(14px + env(safe-area-inset-top)); background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--faint); }
  .header-top { display: flex; align-items: baseline; margin-bottom: 10px; }
  header h1 { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; font-weight: 400; letter-spacing: -0.02em; }
  header h1 em { color: var(--accent); font-style: italic; }
  .add-btn { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; background: var(--ink); color: var(--bg); border: none; padding: 5px 11px; cursor: pointer; border-radius: var(--radius); flex-shrink: 0; display: none; }
  .add-btn:active { background: var(--accent); }
  .add-btn.visible { display: block; }
  .nav-tabs { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { font-family: 'DM Mono', monospace; font-size: 0.58rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 10px 8px; border: none; background: none; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; position: relative; -webkit-tap-highlight-color: transparent; flex-shrink: 0; white-space: nowrap; }
  .nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .nav-tab.prin-tab.active { border-bottom-color: var(--prin); color: var(--prin); }
  .nav-tab.found-tab.active { border-bottom-color: var(--found); color: var(--found); }
  .nav-tab.act-tab.active { border-bottom-color: var(--act); color: var(--act); }
  .nav-tab.people-tab.active { border-bottom-color: var(--people); color: var(--people); }
  .nav-tab .badge { position: absolute; top: 3px; right: 1px; background: var(--accent); color: white; font-size: 0.45rem; font-weight: 700; border-radius: 8px; padding: 1px 3px; min-width: 12px; text-align: center; }
  .view { display: none; }
  .view.active { display: block; }
  .panel-view { padding: 12px; }
  .panel-header { padding: 14px 12px 12px; margin-bottom: 4px; border-radius: var(--radius); position: relative; overflow: hidden; }
  .panel-header::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .panel-prin .panel-header::before { background: var(--prin); }
  .panel-found .panel-header::before { background: var(--found); }
  .panel-act .panel-header::before { background: var(--act); }
  .panel-people .panel-header::before { background: var(--people); }
  .panel-header-title { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; font-weight: 400; font-style: italic; margin-bottom: 3px; }
  .panel-prin .panel-header-title { color: var(--prin); }
  .panel-found .panel-header-title { color: var(--found); }
  .panel-act .panel-header-title { color: var(--act); }
  .panel-people .panel-header-title { color: var(--people); }
  .panel-header-desc { font-size: 0.65rem; color: var(--mid); line-height: 1.5; }
  .tiles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .tile { background: var(--card); border: 1px solid var(--faint); border-radius: var(--radius); box-shadow: 0 1px 4px var(--shadow); position: relative; overflow: hidden; touch-action: auto; }
  .tile.open { grid-column: 1 / -1; }
  .tile.dragging { opacity: 0.4; }
  .tile.drag-over { box-shadow: 0 0 0 2px var(--accent); }
  .tile-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .tile-drag-handle { position: absolute; top: 7px; left: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 2px; cursor: grab; opacity: 0.2; z-index: 5; }
  .tile-drag-handle span { display: block; width: 3px; height: 3px; background: var(--ink); border-radius: 50%; }
  .tile-drag-handle:active { opacity: 0.5; cursor: grabbing; }
  .tile-header { padding: 11px 11px 9px 20px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .tile-title { font-family: 'Libre Baskerville', serif; font-size: 0.88rem; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
  .tile-subtitle { font-size: 0.62rem; color: var(--mid); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .tile-footer { padding: 6px 11px; display: flex; align-items: center; justify-content: space-between; font-size: 0.58rem; color: var(--mid); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tile-chevron { display: inline-block; transition: transform 0.2s; }
  .tile.open > .tile-footer .tile-chevron { transform: rotate(90deg); }
  .tile-body { display: none; padding: 0 11px 12px; border-top: 1px solid var(--faint); }
  .tile.open > .tile-body { display: block; }
  .pri-btn { background: none; border: 1px solid var(--faint); border-radius: 2px; color: var(--mid); cursor: pointer; font-size: 0.52rem; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; padding: 2px 5px; flex-shrink: 0; white-space: nowrap; }
  .pri-btn:active { background: var(--accent2); color: white; border-color: var(--accent2); }
  .pri-btn.in-pri { background: var(--accent2); color: white; border-color: var(--accent2); }
  .elements-list { list-style: none; margin-top: 10px; }
  .element-item { display: flex; align-items: flex-start; gap: 6px; padding: 8px 0; border-bottom: 1px solid var(--faint); font-size: 0.75rem; line-height: 1.4; touch-action: none; }
  .element-item:last-child { border-bottom: none; }
  .element-item.el-dragging { opacity: 0.35; }
  .element-item.el-over { box-shadow: 0 -2px 0 var(--accent); }
  .el-grip { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 3px 2px; cursor: grab; opacity: 0.2; flex-shrink: 0; margin-top: 2px; }
  .el-grip span { display: block; width: 3px; height: 3px; background: var(--ink); border-radius: 50%; }
  .el-grip:active { opacity: 0.5; cursor: grabbing; }
  .el-text { flex: 1; line-height: 1.5; }
  .el-daily-btn { background: none; border: 1px solid var(--faint); border-radius: 2px; color: var(--mid); cursor: pointer; font-size: 0.5rem; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; padding: 2px 4px; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
  .el-daily-btn:active { background: var(--accent); color: white; border-color: var(--accent); }
  .el-daily-btn.in-daily { background: var(--accent); color: white; border-color: var(--accent); }
  .el-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.9rem; padding: 0 2px; min-width: 22px; text-align: center; flex-shrink: 0; }
  .el-del:active { color: var(--accent); }
  .add-element { display: flex; gap: 7px; margin-top: 10px; }
  .add-element input { flex: 1; font-family: 'DM Mono', monospace; font-size: 16px; background: var(--faint); border: 1px solid transparent; border-radius: var(--radius); padding: 8px 9px; color: var(--ink); outline: none; }
  .add-element input:focus { border-color: var(--mid); }
  .add-element input::placeholder { color: var(--mid); opacity: 0.6; }
  .add-element button { font-family: 'DM Mono', monospace; font-size: 0.65rem; background: var(--ink); color: var(--bg); border: none; padding: 8px 11px; border-radius: var(--radius); cursor: pointer; }
  .add-element button:active { background: var(--accent); }
  .edit-panel { background: var(--subcard); border-radius: var(--radius); padding: 11px; margin-top: 11px; display: none; }
  .edit-panel.visible { display: block; }
  .edit-panel label { display: block; font-size: 0.58rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); margin-bottom: 4px; margin-top: 9px; }
  .edit-panel label:first-of-type { margin-top: 0; }
  .edit-panel input, .edit-panel textarea { width: 100%; font-family: 'DM Mono', monospace; font-size: 16px; background: var(--bg); border: 1px solid var(--faint); border-radius: var(--radius); padding: 7px 8px; color: var(--ink); outline: none; -webkit-appearance: none; }
  .edit-panel textarea { resize: vertical; min-height: 48px; }
  .edit-color-options { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 5px; }
  .edit-color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; }
  .edit-color-dot.selected { border-color: var(--ink); }
  .edit-actions { display: flex; gap: 7px; margin-top: 10px; }
  .edit-actions button { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 7px 12px; border: none; border-radius: var(--radius); cursor: pointer; }
  .btn-save { background: var(--ink); color: var(--bg); }
  .btn-save:active { background: var(--accent); }
  .btn-cancel-edit { background: var(--faint); color: var(--ink); }
  .tile-actions { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 9px; border-top: 1px solid var(--faint); }
  .tile-edit-btn, .tile-del-btn { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(--faint); color: var(--mid); padding: 5px 10px; border-radius: var(--radius); cursor: pointer; }
  .tile-edit-btn:active { border-color: var(--mid); color: var(--ink); }
  .tile-del-btn:active { border-color: var(--accent); color: var(--accent); }
  .empty-grid { grid-column: 1/-1; text-align: center; padding: 50px 16px; color: var(--mid); font-size: 0.72rem; opacity: 0.7; font-style: italic; }
  .priorities-view, .daily-view { padding: 16px; }
  .view-date { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 6px; }
  .view-heading { font-family: 'Libre Baskerville', serif; font-size: 1.25rem; font-weight: 400; font-style: italic; color: var(--ink); margin-bottom: 20px; }
  .pri-empty, .daily-empty { text-align: center; padding: 50px 20px; color: var(--mid); }
  .pri-empty h2, .daily-empty h2 { font-family: 'Libre Baskerville', serif; font-size: 1rem; font-weight: 400; font-style: italic; margin-bottom: 8px; }
  .pri-empty p, .daily-empty p { font-size: 0.7rem; opacity: 0.7; line-height: 1.5; }
  .pri-list, .daily-list { list-style: none; }
  .pri-item { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--card); border: 1px solid var(--faint); border-radius: var(--radius); margin-bottom: 10px; box-shadow: 0 1px 4px var(--shadow); touch-action: none; position: relative; overflow: hidden; }
  .pri-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .pri-item.panel-prin::before { background: var(--prin); }
  .pri-item.panel-found::before { background: var(--found); }
  .pri-item.panel-act::before { background: var(--act); }
  .pri-item.panel-people::before { background: var(--people); }
  .pri-item.pri-dragging { opacity: 0.35; }
  .pri-item.pri-drag-over { box-shadow: 0 -2px 0 var(--accent); }
  .pri-grip { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 3px 2px; cursor: grab; opacity: 0.22; flex-shrink: 0; }
  .pri-grip span { display: block; width: 3px; height: 3px; background: var(--ink); border-radius: 50%; }
  .pri-grip:active { opacity: 0.6; cursor: grabbing; }
  .pri-num { font-size: 0.65rem; color: var(--mid); font-weight: 500; flex-shrink: 0; width: 16px; text-align: center; }
  .pri-panel-tag { font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); flex-shrink: 0; }
  .pri-title { font-family: 'Libre Baskerville', serif; font-size: 0.95rem; font-weight: 700; flex: 1; line-height: 1.3; }
  .pri-remove { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.85rem; padding: 0 2px; flex-shrink: 0; }
  .pri-remove:active { color: var(--accent); }
  .view-clear { display: block; width: 100%; font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px dashed var(--faint); color: var(--mid); padding: 9px; border-radius: var(--radius); cursor: pointer; margin-top: 12px; }
  .view-clear:active { border-color: var(--mid); }
  .daily-item { display: flex; align-items: flex-start; gap: 10px; padding: 14px; background: var(--card); border: 1px solid var(--faint); border-radius: var(--radius); margin-bottom: 8px; box-shadow: 0 1px 3px var(--shadow); touch-action: none; position: relative; overflow: hidden; }
  .daily-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .daily-item.panel-prin::before { background: var(--prin); }
  .daily-item.panel-found::before { background: var(--found); }
  .daily-item.panel-act::before { background: var(--act); }
  .daily-item.panel-people::before { background: var(--people); }
  .daily-item.daily-dragging { opacity: 0.35; }
  .daily-item.daily-drag-over { box-shadow: 0 -2px 0 var(--accent); }
  .daily-grip { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 3px 2px; cursor: grab; opacity: 0.22; flex-shrink: 0; margin-top: 2px; }
  .daily-grip span { display: block; width: 3px; height: 3px; background: var(--ink); border-radius: 50%; }
  .daily-grip:active { opacity: 0.6; cursor: grabbing; }
  .daily-item-body { flex: 1; min-width: 0; }
  .daily-item-text { font-size: 0.82rem; line-height: 1.5; margin-bottom: 4px; font-family: 'Libre Baskerville', serif; font-style: italic; }
  .daily-item-source { font-size: 0.58rem; color: var(--mid); letter-spacing: 0.06em; text-transform: uppercase; }
  .daily-remove { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.85rem; padding: 0 2px; flex-shrink: 0; }
  .daily-remove:active { color: var(--accent); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,21,16,0.5); z-index: 500; backdrop-filter: blur(2px); align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 22px 18px; padding-bottom: calc(22px + env(safe-area-inset-bottom)); width: 100%; max-height: 88vh; overflow-y: auto; }
  .modal h2 { font-family: 'Libre Baskerville', serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 16px; }
  .modal label { display: block; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); margin-bottom: 4px; margin-top: 12px; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select, .modal textarea { width: 100%; font-family: 'DM Mono', monospace; font-size: 16px; background: var(--faint); border: 1px solid transparent; border-radius: var(--radius); padding: 10px 11px; color: var(--ink); outline: none; -webkit-appearance: none; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--mid); }
  .modal textarea { resize: vertical; min-height: 55px; }
  .color-opts { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 5px; }
  .color-dot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .color-dot.selected { border-color: var(--ink); }
  .modal-actions { display: flex; gap: 9px; margin-top: 18px; }
  .modal-actions button { font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 11px 18px; border-radius: var(--radius); border: none; cursor: pointer; flex: 1; }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:active { background: var(--accent); }
  .btn-secondary { background: var(--faint); color: var(--ink); }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1><em>Life</em> Strands</h1>
    <button class="add-btn" id="add-btn" onclick="openModal()">+ New tile</button>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab prin-tab active" id="tab-prin" onclick="showView('prin')">Principles</button>
    <button class="nav-tab found-tab" id="tab-found" onclick="showView('found')">Foundations</button>
    <button class="nav-tab act-tab" id="tab-act" onclick="showView('act')">Activities</button>
    <button class="nav-tab people-tab" id="tab-people" onclick="showView('people')">People</button>
    <button class="nav-tab" id="tab-priorities" onclick="showView('priorities')">Priorities <span class="badge" id="pri-badge" style="display:none"></span></button>
    <button class="nav-tab" id="tab-daily" onclick="showView('daily')">Daily <span class="badge" id="daily-badge" style="display:none"></span></button>
  </nav>
</header>
<div class="view active panel-prin" id="view-prin">
  <div class="panel-view">
    <div class="panel-header">
      <div class="panel-header-title">Principles</div>
      <div class="panel-header-desc">The values and truths you orient your life around</div>
    </div>
    <div class="tiles-grid" id="grid-prin"></div>
  </div>
</div>
<div class="view panel-found" id="view-found">
  <div class="panel-view">
    <div class="panel-header">
      <div class="panel-header-title">Foundations</div>
      <div class="panel-header-desc">The ongoing structures that everything else rests on</div>
    </div>
    <div class="tiles-grid" id="grid-found"></div>
  </div>
</div>
<div class="view panel-act" id="view-act">
  <div class="panel-view">
    <div class="panel-header">
      <div class="panel-header-title">Activities</div>
      <div class="panel-header-desc">The projects and endeavours currently in motion</div>
    </div>
    <div class="tiles-grid" id="grid-act"></div>
  </div>
</div>
<div class="view panel-people" id="view-people">
  <div class="panel-view">
    <div class="panel-header">
      <div class="panel-header-title">People</div>
      <div class="panel-header-desc">Minds that have shaped you — and what they gave you</div>
    </div>
    <div class="tiles-grid" id="grid-people"></div>
  </div>
</div>
<div class="view" id="view-priorities">
  <div class="priorities-view">
    <div class="view-date" id="pri-date"></div>
    <div class="view-heading">Priorities</div>
    <div id="pri-content"></div>
  </div>
</div>
<div class="view" id="view-daily">
  <div class="daily-view">
    <div class="view-date" id="daily-date"></div>
    <div class="view-heading">Daily</div>
    <div id="daily-content"></div>
  </div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2>New tile</h2>
    <label>Title</label>
    <input type="text" id="m-title" placeholder="e.g. Presence">
    <label>Description</label>
    <textarea id="m-desc" placeholder="What does this strand mean?"></textarea>
    <label>Colour</label>
    <div class="color-opts" id="color-opts"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveModal()">Create</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script>
const COLORS=['#7a5c3a','#3a5c4a','#3a3d5c','#8a3a4a','#5c3a7a','#2a6b6b','#8a6b2a','#4a6b3a','#6b3a2a','#2a4a6b'];
const PANELS=['prin','found','act','people'];
const PANEL_LABELS={prin:'Principles',found:'Foundations',act:'Activities',people:'People'};
const PANEL_COLORS={prin:'#7a5c3a',found:'#3a5c4a',act:'#3a3d5c',people:'#6b3a5c'};
const SK='lifestrands-v2';
let selColor=COLORS[0],editColorPick={},currentView='prin';
let _id=100;
const uid=()=>_id++;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let tiles=[
  {id:1,title:'Presence',desc:'Being fully here - not elsewhere in mind',panel:'prin',color:COLORS[0],open:false,elements:[{id:10,text:'Attend to what is in front of you'},{id:11,text:'Notice when the mind wanders'},{id:12,text:'Return without judgment'}]},
  {id:2,title:'Integrity',desc:'Acting from the inside out',panel:'prin',color:COLORS[3],open:false,elements:[{id:13,text:'Say what you mean'},{id:14,text:'Do what you say'}]},
  {id:3,title:'Health',desc:'The container everything else runs in',panel:'found',color:COLORS[1],open:false,elements:[{id:20,text:'Daily movement'},{id:21,text:'Sleep before midnight'},{id:22,text:'Monitor blood pressure'}]},

let priorities=[],daily=[];

function save(){try{localStorage.setItem(SK,JSON.stringify({tiles,priorities,daily,_id}));}catch(e){}}
function load(){try{const r=localStorage.getItem(SK);if(!r)return false;const d=JSON.parse(r);if(d.tiles)tiles=d.tiles;if(d.priorities)priorities=d.priorities;if(d.daily)daily=d.daily;if(d._id)_id=d._id;return true;}catch(e){return false;}}
const findTile=id=>tiles.find(t=>t.id===id);

function updateBadges(){
  priorities=priorities.filter(x=>findTile(x.tid));
  daily=daily.filter(x=>{const t=findTile(x.tid);return t&&t.elements.some(e=>e.id===x.eid);});
  const pb=document.getElementById('pri-badge');const db=document.getElementById('daily-badge');
  if(pb){pb.textContent=priorities.length;pb.style.display=priorities.length>0?'':'none';}
  if(db){db.textContent=daily.length;db.style.display=daily.length>0?'':'none';}
}

function isInPri(tid){return priorities.some(x=>x.tid===tid);}
function addToPri(tid){if(!isInPri(tid)){priorities.push({tid});save();renderPanel(findTile(tid)&&findTile(tid).panel);updateBadges();}}
function removeFromPri(tid){priorities=priorities.filter(x=>x.tid!==tid);save();const t=findTile(tid);if(t)renderPanel(t.panel);if(currentView==='priorities')renderPriorities();updateBadges();}

function renderPriorities(){
  const c=document.getElementById('pri-content');
  const de=document.getElementById('pri-date');
  if(de){const d=new Date();de.textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
  if(!c)return;
  priorities=priorities.filter(x=>findTile(x.tid));
  if(!priorities.length){c.innerHTML='<div class="pri-empty"><h2>No priorities set.</h2><p>Tap the "priority" button on any tile to add it here, then drag to rank.</p></div>';return;}
  const items=priorities.map((x,i)=>{const t=findTile(x.tid);if(!t)return '';return '<li class="pri-item panel-'+t.panel+'" data-pidx="'+i+'"><div class="pri-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="pri-num">'+(i+1)+'</div><div style="flex:1"><div class="pri-title">'+esc(t.title)+'</div><div class="pri-panel-tag">'+PANEL_LABELS[t.panel]+'</div></div><button class="pri-remove" onclick="removeFromPri('+x.tid+')">x</button></li>';}).join('');
  c.innerHTML='<ul class="pri-list" id="pri-list">'+items+'</ul><button class="view-clear" onclick="priorities=[];save();renderPriorities();updateBadges()">Clear all</button>';
  updateBadges();initPriDrag();
}

function isInDaily(tid,eid){return daily.some(x=>x.tid===tid&&x.eid===eid);}
function addToDaily(tid,eid){if(!isInDaily(tid,eid)){daily.push({tid,eid});save();renderPanel(findTile(tid)&&findTile(tid).panel);updateBadges();}}
function removeFromDaily(tid,eid){daily=daily.filter(x=>!(x.tid===tid&&x.eid===eid));save();const t=findTile(tid);if(t)renderPanel(t.panel);if(currentView==='daily')renderDaily();updateBadges();}

function renderDaily(){
  const c=document.getElementById('daily-content');
  const de=document.getElementById('daily-date');
  if(de){const d=new Date();de.textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
  if(!c)return;
  daily=daily.filter(x=>{const t=findTile(x.tid);return t&&t.elements.some(e=>e.id===x.eid);});
  if(!daily.length){c.innerHTML='<div class="daily-empty"><h2>Nothing in daily yet.</h2><p>Browse your strands and tap "daily" next to any element to hold it in mind each day.</p></div>';return;}
  const items=daily.map((x,i)=>{const t=findTile(x.tid);if(!t)return '';const el=t.elements.find(e=>e.id===x.eid);if(!el)return '';return '<li class="daily-item panel-'+t.panel+'" data-didx="'+i+'"><div class="daily-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="daily-item-body"><div class="daily-item-text">'+esc(el.text)+'</div><div class="daily-item-source">'+esc(t.title)+' &middot; '+PANEL_LABELS[t.panel]+'</div></div><button class="daily-remove" onclick="removeFromDaily('+x.tid+','+x.eid+')">x</button></li>';}).join('');
  c.innerHTML='<ul class="daily-list" id="daily-list">'+items+'</ul><button class="view-clear" onclick="daily=[];save();renderDaily();updateBadges()">Clear all</button>';
  updateBadges();initDailyDrag();
}

function showView(v){
  currentView=v;
  ['prin','found','act','people','priorities','daily'].forEach(n=>{
    const view=document.getElementById('view-'+n);
    const tab=document.getElementById('tab-'+n);
    if(view)view.classList.toggle('active',v===n);
    if(tab)tab.classList.toggle('active',v===n);
  });
  const ab=document.getElementById('add-btn');
  if(ab)ab.classList.toggle('visible',PANELS.includes(v));
  if(v==='priorities')renderPriorities();

function elGrip(){return '<div class="el-grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>';}

function renderPanel(panel){

  grid.innerHTML=pt.map(t=>{
    const inP=isInPri(t.id);
    const elements=t.elements.map(el=>{const inD=isInDaily(t.id,el.id);return '<li class="element-item" data-tid="'+t.id+'" data-eid="'+el.id+'">'+elGrip()+'<span class="el-text">'+esc(el.text)+'</span><button class="el-daily-btn '+(inD?'in-daily':'')+'" onclick="'+(inD?'removeFromDaily('+t.id+','+el.id+')':'addToDaily('+t.id+','+el.id+')')+'">'+(inD?'added':'daily')+'</button><button class="el-del" onclick="deleteElement('+t.id+','+el.id+')">x</button></li>';}).join('');

  }).join('');
  initTileDrag(panel);initElementDrag(panel);
}

function renderAll(){PANELS.forEach(p=>renderPanel(p));updateBadges();}
function toggleTile(id){const t=findTile(id);if(t){t.open=!t.open;save();renderPanel(t.panel);}}

  list.querySelectorAll('.daily-grip').forEach(grip=>{
    const li=grip.closest('li');if(!li)return;
    grip.addEventListener('touchstart',e=>{dlyTouchSrc=li;const touch=e.touches[0];const rect=li.getBoundingClientRect();dlyTouchOffX=touch.clientX-rect.left;dlyTouchOffY=touch.clientY-rect.top;dlyTouchClone=li.cloneNode(true);dlyTouchClone.style.cssText='position:fixed;z-index:998;width:'+rect.width+'px;opacity:0.85;pointer-events:none;background:var(--card);border-radius:4px;padding:14px;box-shadow:0 4px 16px rgba(26,21,16,0.18);border:1px solid var(--faint);';dlyTouchClone.style.left=(touch.clientX-dlyTouchOffX)+'px';dlyTouchClone.style.top=(touch.clientY-dlyTouchOffY)+'px';document.body.appendChild(dlyTouchClone);li.classList.add('daily-dragging');e.preventDefault();e.stopPropagation();},{passive:false});
    grip.addEventListener('touchmove',e=>{if(!dlyTouchClone)return;const touch=e.touches[0];dlyTouchClone.style.left=(touch.clientX-dlyTouchOffX)+'px';dlyTouchClone.style.top=(touch.clientY-dlyTouchOffY)+'px';dlyTouchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);dlyTouchClone.style.display='';list.querySelectorAll('li.daily-item').forEach(l=>l.classList.remove('daily-drag-over'));const over=el&&el.closest('li.daily-item');if(over&&over!==dlyTouchSrc)over.classList.add('daily-drag-over');e.preventDefault();e.stopPropagation();},{passive:false});
    grip.addEventListener('touchend',e=>{if(!dlyTouchClone){dlyTouchSrc=null;return;}const touch=e.changedTouches[0];dlyTouchClone.style.display='none';const el=document.elementFromPoint(touch.clientX,touch.clientY);dlyTouchClone.style.display='';const over=el&&el.closest('li.daily-item');if(over&&over!==dlyTouchSrc){const si=parseInt(dlyTouchSrc.dataset.didx);const ti=parseInt(over.dataset.didx);if(si>-1&&ti>-1){const[m]=daily.splice(si,1);daily.splice(ti,0,m);save();}}dlyTouchClone.remove();dlyTouchClone=null;list.querySelectorAll('li').forEach(l=>l.classList.remove('daily-dragging','daily-drag-over'));dlyTouchSrc=null;renderDaily();});
    grip.addEventListener('mousedown',()=>{if(li)li.setAttribute('draggable','true');});
    li.addEventListener('dragstart',e=>{if(!e.target.closest('.daily-grip')){e.preventDefault();return;}dlyTouchSrc=li;li.classList.add('daily-dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();});
    li.addEventListener('dragend',()=>{list.querySelectorAll('li').forEach(l=>l.classList.remove('daily-dragging','daily-drag-over'));li.setAttribute('draggable','false');dlyTouchSrc=null;});
    li.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();list.querySelectorAll('li').forEach(l=>l.classList.remove('daily-drag-over'));if(li!==dlyTouchSrc)li.classList.add('daily-drag-over');});
    li.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();if(!dlyTouchSrc||dlyTouchSrc===li)return;const si=parseInt(dlyTouchSrc.dataset.didx);const ti=parseInt(li.dataset.didx);if(si>-1&&ti>-1){const[m]=daily.splice(si,1);daily.splice(ti,0,m);save();}renderDaily();});
  });
}

renderColorOpts();
load();
renderAll();
document.getElementById('add-btn').classList.add('visible');
</script>
